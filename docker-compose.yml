services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: voice-of-care-db
    environment:
      POSTGRES_DB: voice_of_care
      POSTGRES_USER: voice_of_care_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_of_care_user -d voice_of_care"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice-of-care-network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-of-care-backend
    environment:
      DATABASE_URL: postgresql://voice_of_care_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/voice_of_care
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET_AUDIO: ${AWS_S3_BUCKET_AUDIO:-voice-of-care-audio}
      AWS_S3_BUCKET_REPORTS: ${AWS_S3_BUCKET_REPORTS:-voice-of-care-reports}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app   # mount source for live reload and seed script access
    networks:
      - voice-of-care-network
    restart: unless-stopped

  # Nginx: serves built web app + proxies /api/ to the backend.
  # Only starts in the "production" profile.
  #
  # Local dev:  docker compose up                        (postgres + backend only)
  # Production: docker compose --profile production up   (all three services)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: voice-of-care-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - voice-of-care-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  voice-of-care-network:
    driver: bridge
